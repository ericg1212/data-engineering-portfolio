version: 2

sources:
  - name: raw
    database: PHARMA_CLIFF
    schema: RAW
    tables:
      - name: orange_book
        columns:
          - name: drug_name
            tests: [not_null]
          - name: exclusivity_code
            tests:
              - not_null
              - accepted_values:
                  values: ['NCE', 'NCE-1']
          - name: exclusivity_date
            tests: [not_null]

      - name: yfinance
        columns:
          - name: ticker
            tests:
              - not_null
              - accepted_values:
                  values: ['MRK', 'BMY', 'AZN', 'LLY', 'PFE', 'JNJ', 'ABBV']
          - name: date
            tests: [not_null]
          - name: close
            tests: [not_null]

      - name: clinical_trials
        columns:
          - name: nct_id
            tests: [not_null, unique]
          - name: ticker
            tests: [not_null]
          - name: phase
            tests:
              - accepted_values:
                  values: ['PHASE3']

models:
  - name: stg_orange_book
    columns:
      - name: drug_name
        tests: [not_null]
      - name: exclusivity_date
        tests: [not_null]
      - name: exclusivity_code
        tests:
          - accepted_values:
              values: ['NCE', 'NCE-1']

  - name: stg_yfinance
    columns:
      - name: ticker
        tests: [not_null]
      - name: date
        tests: [not_null]
      - name: close
        tests: [not_null]

  - name: stg_clinical_trials
    columns:
      - name: nct_id
        tests: [not_null, unique]

  - name: int_cliff_events
    columns:
      - name: ticker
        tests: [not_null]
      - name: drug_name
        tests: [not_null]
      - name: nce_expiry_date
        tests: [not_null]
      - name: cliff_category
        tests:
          - accepted_values:
              values: ['past', 'imminent', 'near_term', 'long_term']

  - name: mart_revenue_decline
    columns:
      - name: ticker
        tests: [not_null]
      - name: drug_name
        tests: [not_null]
      - name: cliff_year
        tests: [not_null]

  - name: mart_pipeline_readiness
    columns:
      - name: ticker
        tests:
          - not_null
          - unique
          - accepted_values:
              values: ['MRK', 'BMY', 'AZN', 'LLY', 'PFE', 'JNJ', 'ABBV']
      - name: readiness_score
        tests: [not_null]

  - name: mart_drawdown_timeline
    columns:
      - name: ticker
        tests: [not_null]
      - name: cliff_date
        tests: [not_null]
