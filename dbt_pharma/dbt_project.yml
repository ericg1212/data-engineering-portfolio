name: 'dbt_pharma'
version: '1.0.0'
config-version: 2

profile: 'dbt_pharma'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  dbt_pharma:
    staging:
      +schema: STAGING
      +materialized: view
    intermediate:
      +schema: INTERMEDIATE
      +materialized: table
    mart:
      +schema: MART
      +materialized: table

# All models tag for selective runs
vars:
  company_tickers: ['MRK', 'BMY', 'AZN', 'LLY', 'PFE', 'JNJ', 'ABBV']
  nce_codes: ['NCE', 'NCE-1']
