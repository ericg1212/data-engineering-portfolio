name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "boto3>=1.34.0,<2.0.0" \
            "pandas>=2.1.0,<3.0.0" \
            "numpy>=1.26.0,<2.0.0" \
            "pyarrow>=14.0.0,<20.0.0" \
            "requests>=2.31.0,<3.0.0" \
            "pytest>=7.4.0,<9.0.0" \
            "moto[s3,athena]>=5.0.0,<6.0.0" \
            "responses>=0.25.0,<1.0.0" \
            "yfinance>=0.2.0,<1.0.0" \
            "flake8>=7.0.0,<8.0.0" \
            "bandit>=1.7.0,<2.0.0" \
            "pip-audit>=2.7.0,<3.0.0" \
            "checkov>=3.0.0,<4.0.0"

      - name: Lint
        run: flake8 utils.py config.py stock_pipeline/ edgar_pipeline/ fred_pipeline/ analysis_pipeline/ monitoring/ tests/

      - name: Security scan (bandit)
        run: |
          bandit -r utils.py config.py stock_pipeline/ \
            edgar_pipeline/ fred_pipeline/ analysis_pipeline/ monitoring/ \
            --severity-level medium -q

      - name: Dependency vulnerability scan (pip-audit)
        # GHSA-w7rc-q6cm-f5gm + GHSA-p3v3-229h-mc63: Airflow 3.x-only fixes, tolerable_risk
        # in single-user local dev — dismissed in Dependabot alerts #10 and #11
        run: |
          pip-audit -r requirements.txt \
            --ignore-vuln GHSA-w7rc-q6cm-f5gm \
            --ignore-vuln GHSA-p3v3-229h-mc63

      - name: Terraform IaC security scan (checkov)
        run: checkov -d terraform/ --framework terraform --quiet --compact

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85  # v4.0.0

      - name: Terraform fmt check
        run: terraform fmt -check terraform/

      - name: Run tests
        run: pytest tests/ -v
